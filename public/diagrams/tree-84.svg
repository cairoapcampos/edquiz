<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420" viewBox="0 0 640 420">
  <defs>
    <style>
      .node { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
      .edge { stroke: #1f2937; stroke-width: 2; stroke-linecap: round; }
      .txt { font: 700 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #111827; }
    </style>
  </defs>

  <!-- edges -->
  <line class="edge" x1="320" y1="70" x2="210" y2="150" />
  <line class="edge" x1="320" y1="70" x2="430" y2="150" />

  <line class="edge" x1="210" y1="190" x2="140" y2="270" />
  <line class="edge" x1="210" y1="190" x2="280" y2="270" />

  <line class="edge" x1="430" y1="190" x2="500" y2="270" />

  <line class="edge" x1="280" y1="310" x2="245" y2="390" />

  <!-- nodes -->
  <circle class="node" cx="320" cy="50" r="28" />
  <text class="txt" x="320" y="56" text-anchor="middle">8</text>

  <circle class="node" cx="210" cy="170" r="28" />
  <text class="txt" x="210" y="176" text-anchor="middle">2</text>

  <circle class="node" cx="430" cy="170" r="28" />
  <text class="txt" x="430" y="176" text-anchor="middle">9</text>

  <circle class="node" cx="140" cy="290" r="28" />
  <text class="txt" x="140" y="296" text-anchor="middle">1</text>

  <circle class="node" cx="280" cy="290" r="28" />
  <text class="txt" x="280" y="296" text-anchor="middle">6</text>

  <circle class="node" cx="500" cy="290" r="28" />
  <text class="txt" x="500" y="296" text-anchor="middle">10</text>

  <circle class="node" cx="245" cy="410" r="28" />
  <text class="txt" x="245" y="416" text-anchor="middle">5</text>
</svg>

